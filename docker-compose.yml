services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_schemas:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantetto -d plantetto_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      SECRET_KEY: ${SECRET_KEY}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      DEV_EMAIL: ${DEV_EMAIL}
      DEV_EMAIL_FROM: ${DEV_EMAIL_FROM}
      PROD_EMAIL_FROM: ${PROD_EMAIL_FROM}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7370:7370"

  frontend:
    build: ./frontend
    ports:
      - "7371:7371"
    depends_on:
      - backend

volumes:
  postgres_data:
